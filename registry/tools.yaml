# VCM Tool Registry
# CLI AI 编程工具注册表

version: 1
updated: "2025-03-14"
source: https://github.com/arden/vcm

tools:
  # === Anthropic ===
  - id: claude-code
    name: Claude Code
    vendor: Anthropic
    description: |
      终端 AI 编程助手，具备强大的推理能力。
      支持代码编辑、调试、重构等多种编程任务。
    website: https://claude.ai
    repository: https://github.com/anthropics/claude-code
    executables:
      - claude
      - claude-code
    install_methods:
      - manager: npm
        package: "@anthropic-ai/claude-code"
    config_paths:
      - ~/.claude
      - ~/.config/claude
    env_vars:
      - name: ANTHROPIC_API_KEY
        description: Anthropic API Key
        required: true
        get_url: https://console.anthropic.com
    tags:
      - ai
      - coding
      - cli
      - llm
      - anthropic
    is_cli: true
    is_gui: false
    featured: true
    pricing:
      free_tier: false
      credit_card_required: false
      price_note: "Requires Anthropic API Key (pay-per-use)"

  # === Open Source ===
  - id: aider
    name: Aider
    vendor: Open Source
    description: |
      开源 AI 结对编程工具，支持多种 LLM 后端。
      可以在终端中与 AI 协作编写和修改代码。
    website: https://aider.chat
    repository: https://github.com/paul-gauthier/aider
    executables:
      - aider
    install_methods:
      - manager: pip
        package: aider-chat
      - manager: pipx
        package: aider-chat
    config_paths:
      - ~/.aider.conf.yml
    env_vars:
      - name: OPENAI_API_KEY
        description: OpenAI API Key
        required: false
        get_url: https://platform.openai.com/api-keys
      - name: ANTHROPIC_API_KEY
        description: Anthropic API Key
        required: false
        get_url: https://console.anthropic.com
    tags:
      - ai
      - coding
      - cli
      - opensource
    is_cli: true
    is_gui: false
    featured: true
    pricing:
      free_tier: true
      free_limit: "Unlimited with BYOK or local models"
      free_models:
        - name: "Local models via Ollama"
          pro_grade: false
        - name: "Qwen3-Coder (via OpenRouter free)"
          pro_grade: true
          description: "69.6% SWE-bench"
        - name: "Gemini Flash (via free API)"
          pro_grade: false
      credit_card_required: false
      price_note: "Free with own API keys or local models"

